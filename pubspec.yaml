name: smart_utility_toolkit
description: Smart Utility Toolkit Flutter mobile application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  injectable: ^2.4.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flex_color_scheme: ^8.0.0
  intl: ^0.20.2
  http: ^1.2.2
  flutter_haptic_feedback: ^1.0.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  flutter_screenutil: ^5.9.3

dev_dependencies:
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  injectable_generator: ^2.6.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/

